  <script>
    window.onscroll = function () {
      if (window.scrollY > 60) {
        document.querySelector("nav").classList.add("bg-[#086064]");
        document.querySelector("nav").classList.add("backdrop-blur-lg");
        document.querySelector("#menuArea").classList.add("!bg-opacity-100");
      } else {
        document.querySelector("nav").classList.remove("bg-[#086064]");
        document.querySelector("nav").classList.remove("backdrop-blur-lg");
        document.querySelector("#menuArea").classList.remove("!bg-opacity-100");
      }
    };
    function openMenu() {
      menuArea.classList.remove("hidden");
    }

    function closeMenu() {
      menuArea.classList.add("hidden");
    }
  </script>
